name: User Story (INVEST + AC)
description: Create a user story with MoSCoW priority and clear AC.
title: "feat: <short title>"
labels: ["story"]
body:
  - type: input
    id: role
    attributes:
      label: As a (role)
      placeholder: e.g., traveler
  - type: textarea
    id: goal
    attributes:
      label: I want to (goal)
      placeholder: e.g., plan a 3-day itinerary quickly
  - type: textarea
    id: reason
    attributes:
      label: So that (reason)
      placeholder: e.g., I can compare trip options
  - type: dropdown
    id: priority
    attributes:
      label: MoSCoW Priority
      options:
        - Must
        - Should
        - Could
        - Won't (this time)
  - type: textarea
    id: ac
    attributes:
      label: Acceptance Criteria (AC)
      description: One per line. Prefix with TPA-*** if mapped to this repo's backlog.
      placeholder: |
        TPA-001: Form shows destination/start/end with ARIA labels
        TPA-002: Validation blocks submit when invalid (no API calls)
  - type: textarea
    id: notes
    attributes:
      label: Notes / Links
      placeholder: e.g., related API docs, designs

